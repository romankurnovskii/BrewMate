name: Build and Test

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          npm install
        working-directory: .

      - name: Tests
        run: |
          npm test
        working-directory: .

      - name: Build Electron App
        run: |
          npm run build
        working-directory: .

      - name: Package App (Dry Run)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npx electron-builder --mac --dir
        working-directory: .

      - name: Verify Startup (Smoke Test)
        run: |
          APP_PATH=$(find dist-app -name "BrewMate.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: BrewMate.app not found!"
            exit 1
          fi
          echo "Found application at: $APP_PATH"
          "$APP_PATH/Contents/MacOS/BrewMate" --test-startup
        working-directory: .
