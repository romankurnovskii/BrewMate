name: Mac App Store Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

jobs:
  release:
    name: Build & Release to MAS
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Setup macOS Certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 21)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate from secrets
          echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          
          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Set the keychain as the default
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Setup Provisioning Profile
        env:
          MACOS_PROVISIONING_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MACOS_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/BrewMate_Distribution.provisionprofile

      - name: Build and Package MAS (Universal)
        env:
          SKIP_VERSION_BUMP: true
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: ./scripts/build-mas-universal.sh

      - name: Get Build Info
        id: build_info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PKG_FILE=$(find dist-app -name "BrewMate-*-universal.pkg" -type f | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "PKG_FILE=$PKG_FILE" >> $GITHUB_OUTPUT

      - name: Upload to App Store Connect
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "🚀 Uploading ${{ steps.build_info.outputs.PKG_FILE }} to App Store Connect..."
          xcrun altool --upload-app --type macos --file "${{ steps.build_info.outputs.PKG_FILE }}" \
            --username "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: BrewMate-MAS-${{ steps.build_info.outputs.VERSION }}
          path: dist-app/
